<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gamma Generator</title><link rel="stylesheet" href="/styles.css"></head><body><header><h1>Gamma Generator</h1></header><nav><a href="/index.html">Home</a><a href="/admin.html">Admin</a><a href="/gamma.html">Gamma</a></nav><main><section class="card"><h2>Placeholder</h2><p>Gamma generation requires an external credentialed service. Save generated URL below when available.</p><form id="gamma-form"><input type="number" name="clientId" placeholder="Client ID" required><input type="url" name="gammaUrl" placeholder="https://gamma.app/... (optional)"><button>Save Gamma State</button></form><pre id="output"></pre></section></main><script>document.getElementById('gamma-form').addEventListener('submit',async(e)=>{e.preventDefault();const data=Object.fromEntries(new FormData(e.target).entries());data.clientId=Number(data.clientId);const r=await fetch('/api/gamma',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(data)});document.getElementById('output').textContent=JSON.stringify(await r.json(),null,2);});</script></body></html>
