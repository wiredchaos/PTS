<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upload Client Documents</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Upload Client Documents</h1>
    <p>Upload one client document and queue it for review.</p>
  </header>
  <nav>
    <a href="/index.html">Home</a>
    <a href="/client-portal.html">Client Portal</a>
    <a href="/upload.html">Upload</a>
  </nav>
  <main>
    <section class="card">
      <h2>Upload Document</h2>
      <form id="upload-form">
        <label>Client ID<br><input name="clientId" type="number" min="1" placeholder="Client ID" required></label><br><br>
        <label>Tax Year<br><input name="taxYear" type="number" min="2000" max="2100" placeholder="Tax Year" required></label><br><br>
        <label>Choose File<br><input name="file" type="file" required></label><br><br>
        <button id="upload-button" type="submit">Upload Document</button>
      </form>
      <div id="status" class="card" style="margin-top:1rem;">Ready to upload.</div>
    </section>
  </main>
  <script>
    const form = document.getElementById('upload-form');
    const button = document.getElementById('upload-button');
    const statusBox = document.getElementById('status');

    function clean(value) {
      return String(value || '').replace(/[<>&]/g, '');
    }

    function show(message) {
      statusBox.innerHTML = message;
    }

    form.addEventListener('submit', async function(event) {
      event.preventDefault();
      button.disabled = true;
      button.textContent = 'Uploading...';
      show('Uploading...');

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: new FormData(form)
        });
        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || 'Upload failed. Please try again.');
        }

        const doc = data.document || {};
        show(
          '<strong>Upload complete.</strong><br>' +
          'Document queued for Hermes review.<br><br>' +
          '<strong>File:</strong> ' + clean(doc.filename) + '<br>' +
          '<strong>Tax Year:</strong> ' + clean(doc.taxYear) + '<br>' +
          '<strong>Status:</strong> ' + clean(doc.processingStatus || 'queued')
        );
        form.reset();
      } catch (error) {
        show('<strong>Upload could not be completed.</strong><br>' + clean(error.message));
      } finally {
        button.disabled = false;
        button.textContent = 'Upload Document';
      }
    });
  </script>
</body>
</html>
