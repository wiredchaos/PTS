<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Upload Documents</title><link rel="stylesheet" href="/styles.css"></head>
<body>
<header><h1>Universal Document Upload</h1></header>
<nav>
  <a href="/index.html">Home</a>
  <a href="/client-portal.html">Client Portal</a>
  <a href="/upload.html">Upload</a>
</nav>
<main>
  <section class="card">
    <h2>Single Upload</h2>
    <form id="single-form"><input name="clientId" type="number" placeholder="Client ID" required><input name="taxYear" type="number" placeholder="Tax Year" required><input name="file" type="file" required><button>Upload</button></form>
  </section>
  <section class="card">
    <h2>Bulk Upload</h2>
    <form id="bulk-form"><input name="clientId" type="number" placeholder="Client ID" required><input name="taxYear" type="number" placeholder="Tax Year" required><input name="files" type="file" multiple required><button>Bulk Upload</button></form>
  </section>
  <pre id="output"></pre>
</main>
<script>
async function submitForm(form, endpoint) {
  const out = document.getElementById('output');
  const res = await fetch(endpoint, { method: 'POST', body: new FormData(form) });
  out.textContent = JSON.stringify(await res.json(), null, 2);
}
document.getElementById('single-form').addEventListener('submit', (e) => { e.preventDefault(); submitForm(e.target, '/api/upload'); });
document.getElementById('bulk-form').addEventListener('submit', (e) => { e.preventDefault(); submitForm(e.target, '/api/bulk-upload'); });
</script>
</body>
</html>
