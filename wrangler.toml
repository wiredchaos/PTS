name = "pts-cloudflare-portal"
compatibility_date = "2026-06-30"
pages_build_output_dir = "."

[[d1_databases]]
binding = "DB"
database_name = "pts"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "pts-uploads"

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
