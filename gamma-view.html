<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gamma Viewer</title><link rel="stylesheet" href="/styles.css"></head><body><header><h1>Gamma Presentation Viewer</h1></header><nav><a href="/index.html">Home</a><a href="/client-portal.html">Client Portal</a><a href="/gamma-view.html">Gamma Viewer</a></nav><main><section class="card" id="placeholder"><p>Deck not generated yet.</p></section><iframe id="deck" title="Gamma Deck" hidden style="width:100%;height:600px;border:1px solid #ccc;"></iframe></main><script>(async()=>{const p=new URLSearchParams(location.search);const clientId=p.get('clientId');if(!clientId)return;const r=await fetch(`/api/gamma-view?clientId=${encodeURIComponent(clientId)}`);const data=await r.json();if(data.exists&&data.url){const i=document.getElementById('deck');i.src=data.url;i.hidden=false;document.getElementById('placeholder').hidden=true;}})();</script></body></html>
